<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MiniLearn Bloom · Carnet</title>
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
<a class="sr-only" href="#main">Aller au contenu</a>


<header class="site-header container">
<a class="logo" href="#">🍒 Bloom</a>
<nav class="actions">
<button id="themeToggle" class="btn ghost" aria-pressed="false" aria-label="Basculer le thème">🌓</button>
</nav>
</header>


<main id="main" class="container">
<section class="hero">
<h1>🪴Fais pousser tes habitudes et cultive tes objectifs....</h1>
<p class="muted">Ajoute des objectifs, coche-les chaque jour.</p>


<form id="goalForm" class="inline-form" aria-label="Ajouter un objectif">
<label class="sr-only" for="goalTitle">Nouvel objectif</label>
<input id="goalTitle" name="title" placeholder="Ex. 10 min d’anglais" required />
<select id="goalIcon" aria-label="Icône">
<option>🌱</option><option>📚</option><option>💧</option><option>🏃‍♀️</option>
</select>
<button class="btn" type="submit">Ajouter</button>
</form>
</section>


<!-- Liste des objectifs -->
<section aria-label="Objectifs">
<div id="goals" class="grid" role="list"></div>
</section>


<!-- Progression / Jardin -->
<section class="garden">
<div id="gardenView" class="garden-view" aria-live="polite">🌱 0%</div>
<div class="progress-wrap" aria-hidden="true">
<div id="progressBar" class="progress-bar" style="width:0%"></div>
</div>
<p id="badgeInfo" class="muted">Aucun badge pour l’instant.</p>
</section>


<!-- Zone d’annonce pour lecteurs d’écran -->
<div id="live" class="sr-only" aria-live="polite"></div>
</main>


<footer class="site-footer container">
<small class="muted">MiniLearn Bloom</small>
</footer>


<!-- JS fichiers -->
<script src="assets/js/storage.js"></script>
<script src="assets/js/theme.js"></script>
<script src="assets/js/render.js"></script>
<script src="assets/js/actions.js"></script>
<script src="assets/js/main.js"></script>
</body>
</html>
